name: Update model catalog

on:
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: catalog-update
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Fetch catalog and diff
        run: node scripts/fetch.mjs

      - name: Commit if anything changed
        run: |
          if git diff --quiet -- data/; then
            echo "No catalog changes; skipping commit."
            exit 0
          fi
          git config user.name "modelwatch-bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/
          git commit -m "catalog: $(date -u +%Y-%m-%dT%H:%MZ)"
          git push
